<style>
  /* ── HERO ── */
  .hero{background:#1B4A44;padding:76px 40px 56px;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 700px 500px at 80% 55%,rgba(91,167,159,.07) 0%,transparent 68%);pointer-events:none}
  .hi{max-width:var(--page-max);margin:0 auto;position:relative;z-index:1}
  .eyebrow{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--sage);margin-bottom:20px}
  .hero-hl{font-family:'Poppins',sans-serif;font-size:clamp(28px,3.6vw,44px);font-weight:700;color:var(--white);line-height:1.15;letter-spacing:-.02em;margin-bottom:16px;max-width:760px}
  .hero-sub{font-family:'Inter',sans-serif;font-size:16px;line-height:1.7;color:rgba(255,255,255,.75);max-width:600px}

  /* ── MAIN / FILTER BAR ── */
  main{max-width:var(--page-max);margin:0 auto;padding:32px 40px 88px}
  .filter-bar-wrap{position:relative}
  .filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;position:sticky;top:var(--site-total-offset,56px);background:var(--off-white);padding:14px 0;z-index:10}
  .filter-scroll-btn{display:none;position:absolute;top:28px;transform:translateY(-50%);align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--white);border:1px solid rgba(31,77,74,.2);box-shadow:0 2px 8px rgba(27,74,68,.15);color:var(--mid-teal);cursor:pointer;z-index:11;padding:0}
  .filter-scroll-btn:focus-visible{outline:2px solid var(--mid-teal);outline-offset:2px}
  .filter-scroll-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
  .filter-scroll-prev{left:-4px}
  .filter-scroll-next{right:-4px}
  .filter-chip{display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:.02em;padding:7px 14px;border-radius:999px;border:1px solid rgba(31,77,74,.2);background:var(--white);color:var(--text-mid);cursor:pointer;transition:background .15s,color .15s,border-color .15s}
  .filter-chip:hover{border-color:rgba(31,77,74,.4)}
  .filter-chip.active{background:var(--mid-teal);border-color:var(--mid-teal);color:var(--white)}
  .filter-chip[style].active{border-color:transparent;box-shadow:inset 0 0 0 2px currentColor}
  .filter-chip:focus-visible{outline:2px solid var(--mid-teal);outline-offset:2px}
  .filter-chip svg{width:13px;height:13px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ── MASTER-DETAIL LAYOUT ── */
  .news-layout{display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:start}

  /* ── HEADLINE PANEL (left) ── */
  .headline-col{border:1px solid var(--light-sage);border-radius:var(--radius-lg);background:var(--white);display:flex;flex-direction:column;max-height:calc(100vh - var(--site-total-offset,56px) - 48px);overflow:hidden}
  .headline-search-wrap{position:relative;flex-shrink:0;border-bottom:1px solid var(--light-sage);padding:10px}
  .headline-search-icon{position:absolute;left:20px;top:50%;transform:translateY(-50%);width:14px;height:14px;fill:none;stroke:var(--text-muted);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
  .headline-search-input{width:100%;box-sizing:border-box;padding:8px 10px 8px 32px;border:1px solid rgba(31,77,74,.18);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:13px;color:var(--text-dark);background:var(--off-white)}
  .headline-search-input:focus-visible,.headline-search-input:focus{outline:2px solid var(--mid-teal);outline-offset:1px}
  .headline-panel{border:none;border-radius:0;background:none;flex:1;max-height:none;overflow-y:auto;padding:8px}
  .headline-group-header{position:sticky;top:0;z-index:1;background:var(--white);padding:10px 12px 4px;font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mid-teal)}
  .headline-date-prefix{color:var(--mid-teal);font-weight:600}
  .headline-pin-icon{display:inline-flex;vertical-align:-1px;color:var(--terracotta);margin-right:3px}
  .headline-pin-icon svg{width:11px;height:11px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .headline-divider{height:1px;background:var(--light-sage);margin:6px 10px}
  .headline-item{display:block;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;border-radius:0 var(--radius) var(--radius) 0;padding:9px 12px 9px 10px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13.5px;line-height:1.4;color:var(--text-muted);transition:background .15s,color .15s,border-color .15s}
  .headline-item:hover{background:var(--off-white);color:var(--text-dark)}
  .headline-item:focus-visible{outline:2px solid var(--mid-teal);outline-offset:-2px}
  .headline-item.active{background:var(--off-white);border-left-color:var(--terracotta);color:var(--navy);font-weight:600}
  .headline-item.pinned{background:rgba(199,123,95,.08)}
  .headline-item.pinned:hover{background:rgba(199,123,95,.14)}
  .headline-item.pinned.active{background:rgba(199,123,95,.16)}
  .headline-archive{margin-top:6px;border-top:1px solid var(--light-sage);padding-top:4px}
  .headline-archive-toggle{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:10px 12px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mid-teal);cursor:pointer;border-radius:var(--radius)}
  .headline-archive-toggle:hover{background:var(--off-white)}
  .headline-archive-toggle:focus-visible{outline:2px solid var(--mid-teal);outline-offset:-2px}
  .headline-archive-toggle svg{width:12px;height:12px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
  .headline-archive-toggle[aria-expanded="true"] svg{transform:rotate(180deg)}
  .headline-archive-body{display:none}
  .headline-archive.expanded .headline-archive-body{display:block}

  /* ── STORY PANEL (right) ── */
  .story-panel{border:1px solid var(--light-sage);border-radius:var(--radius-lg);background:var(--white);padding:32px 36px}
  .story-back{display:none;align-items:center;gap:6px;background:none;border:none;padding:0 0 20px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--mid-teal);cursor:pointer}
  .story-back:focus-visible{outline:2px solid var(--mid-teal);outline-offset:3px;border-radius:2px}
  .story-toprow{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:20px}
  .story-meta{display:flex;flex-direction:column;gap:6px}
  .story-source{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--terracotta);white-space:nowrap}
  .story-pinned-badge{display:inline-flex;align-items:center;gap:5px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--terracotta);white-space:nowrap}
  .story-pinned-badge svg{width:11px;height:11px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .story-nav{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .story-nav-btn{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:.02em;background:none;border:1px solid rgba(31,77,74,.2);border-radius:999px;padding:5px 12px;color:var(--mid-teal);cursor:pointer;transition:background .15s,border-color .15s}
  .story-nav-btn:hover:not(:disabled){background:var(--off-white);border-color:rgba(31,77,74,.4)}
  .story-nav-btn:focus-visible{outline:2px solid var(--mid-teal);outline-offset:2px}
  .story-nav-btn:disabled{opacity:.35;cursor:default}
  .story-title{font-family:'Poppins',sans-serif;font-size:24px;font-weight:700;line-height:1.3;letter-spacing:-.01em;color:var(--navy);margin:0 0 14px}
  .story-summary{font-family:'Inter',sans-serif;font-size:15.5px;line-height:1.75;color:var(--text-muted);margin-bottom:22px}
  .story-implications{border-left:3px solid var(--light-sage);padding-left:14px;margin-bottom:22px}
  .story-implications-label{display:block;font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--mid-teal);margin-bottom:6px}
  .story-implications p{font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;color:var(--text-muted);font-style:italic;margin:0}
  .story-source-link{display:inline-flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;color:var(--story-accent, var(--mid-teal));text-decoration:none;margin-bottom:22px}
  .story-source-link:hover{color:var(--terracotta)}
  .story-source-link:focus-visible{outline:2px solid var(--mid-teal);outline-offset:3px;border-radius:2px}
  .story-tags{display:flex;flex-wrap:wrap;gap:6px}
  .story-tag{font-family:'Poppins',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.02em;padding:4px 10px;border-radius:999px;background:var(--light-sage);color:var(--navy)}

  .story-share{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:22px 0 0;padding-top:20px;border-top:1px solid var(--light-sage)}
  .share-label{font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);margin-right:2px}
  .share-btn{display:inline-flex;align-items:center;font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;letter-spacing:.02em;padding:6px 13px;border-radius:999px;border:1px solid rgba(31,77,74,.2);background:var(--white);color:var(--text-mid);cursor:pointer;text-decoration:none;transition:background .15s,color .15s,border-color .15s}
  .share-btn:hover{border-color:rgba(31,77,74,.4);background:var(--off-white)}
  .share-btn:focus-visible{outline:2px solid var(--mid-teal);outline-offset:2px}

  .empty-state{font-family:'Inter',sans-serif;font-size:14px;color:var(--text-muted);padding:40px 0;text-align:center}

  footer{background:var(--charcoal);padding:32px 40px;border-top:1px solid rgba(255,255,255,.06)}
  .fi{max-width:var(--page-max);margin:0 auto}
  .footer-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .footer-tagline{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,.45);letter-spacing:.02em}
  .footer-nav{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
  .footer-nav a{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.35);text-decoration:none;transition:color .15s}
  .footer-nav a:hover{color:rgba(255,255,255,.7)}
  .footer-nav a:focus-visible{outline:2px solid var(--sage);outline-offset:3px;border-radius:2px}
  .footer-sep{color:rgba(255,255,255,.15);user-select:none}
  .fn{font-family:'Inter',sans-serif;font-size:12px;color:rgba(255,255,255,.25);margin-top:12px}

  @media(max-width:800px){
    .news-layout{grid-template-columns:1fr}
    .headline-col{max-height:none}
    .story-panel{display:none}
    .story-back{display:inline-flex}
    .news-layout.show-detail .headline-col{display:none}
    .news-layout.show-detail .story-panel{display:block}
    .story-panel{padding:24px 20px}
    .story-title{font-size:20px}
    .story-toprow{flex-wrap:wrap;gap:10px 12px}
    .filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-left:34px;padding-right:34px;mask-image:linear-gradient(to right,transparent,black 40px,black calc(100% - 40px),transparent);-webkit-mask-image:linear-gradient(to right,transparent,black 40px,black calc(100% - 40px),transparent)}
    .filter-bar::-webkit-scrollbar{display:none}
    .filter-chip{flex-shrink:0}
    .filter-scroll-btn:not([hidden]){display:flex}
  }
  @media(max-width:700px){
    .hero,main{padding-left:20px;padding-right:20px}
    footer{padding-left:20px;padding-right:20px}
  }
</style>
</head>

<script>
(function () {
  'use strict';

  var THEME_ORDER = [
    'skills development', 'workforce transformation',
    'leadership and culture', 'macro signals', 'research and insights'
  ];

  var THEME_ICON_PATHS = {
    'skills development': '<path d="M2 4h7a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H2z"/><path d="M22 4h-7a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h8z"/>',
    'workforce transformation': '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>',
    'leadership and culture': '<circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>',
    'macro signals': '<polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/>',
    'research and insights': '<path d="M9 2v6L3.5 18a2 2 0 0 0 1.8 3h13.4a2 2 0 0 0 1.8-3L15 8V2"/><path d="M9 2h6"/>'
  };
  var ALL_ICON_PATH = '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>';
  var PIN_ICON_PATH = '<path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7Z"/><circle cx="12" cy="9" r="2.5"/>';
  var ARCHIVE_CHEVRON_ICON_PATH = '<polyline points="6 9 12 15 18 9"/>';

  var THEME_COLORS = {
    'skills development': { bg: '#D8E4DD', text: '#1B4A44' },
    'workforce transformation': { bg: '#D5DFE6', text: '#1E3A4A' },
    'leadership and culture': { bg: '#EDE5C5', text: '#6B5416' },
    'macro signals': { bg: '#DADDD2', text: '#4A4A3C' },
    'research and insights': { bg: '#F0D9CE', text: '#7A3B22' }
  };
  var THEME_LABELS = {
    'skills development': 'Skills Development',
    'workforce transformation': 'Workforce Transformation',
    'leadership and culture': 'Leadership & Culture',
    'macro signals': 'Macro Signals',
    'research and insights': 'Research & Insights'
  };
  var TITLE_CASE_LOWER = { and: 1, or: 1, of: 1, the: 1, in: 1, on: 1 };

  function themeIconSVG(paths) {
    return '<svg viewBox="0 0 24 24" aria-hidden="true">' + paths + '</svg>';
  }

  function titleCase(s) {
    return String(s).split(' ').map(function (w, i) {
      if (i > 0 && TITLE_CASE_LOWER[w.toLowerCase()]) return w.toLowerCase();
      return w.charAt(0).toUpperCase() + w.slice(1);
    }).join(' ');
  }

  var layoutEl = document.getElementById('news-layout');
  var headlinePanel = document.getElementById('headline-panel');
  var storyPanel = document.getElementById('story-panel');
  var filterBar = document.getElementById('filter-bar');
  var filterScrollPrev = document.getElementById('filter-scroll-prev');
  var filterScrollNext = document.getElementById('filter-scroll-next');
  var activeTag = 'all';
  var digests = [];
  var flatStories = []; // { id, date, ...story }
  var activeId = null;
  var expandedGroups = { Yesterday: false, 'This Week': false, Older: false };
  var ARCHIVE_CUTOFF_DAYS = 7;
  var searchQuery = '';
  var headlineSearchInput = document.getElementById('headline-search');

  function fmtDateLong(iso) {
    var d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function fmtDatePrefix(iso) {
    var d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    var day = String(d.getDate()).padStart(2, '0');
    var month = d.toLocaleDateString('en-US', { month: 'short' });
    return day + ' ' + month;
  }

  function daysAgo(iso) {
    var d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return null;
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    return Math.round((today - d) / 86400000);
  }

  function bucketKey(days) {
    if (days === null) return 'Older';
    if (days <= 0) return 'Today';
    if (days === 1) return 'Yesterday';
    if (days < ARCHIVE_CUTOFF_DAYS) return 'This Week';
    return 'Older';
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function buildFlatStories() {
    flatStories = [];
    digests.forEach(function (group) {
      (group.stories || []).forEach(function (s, i) {
        flatStories.push(Object.assign({}, s, { id: group.date + '-' + i, date: group.date }));
      });
    });
  }

  function storyMatchesFilter(s) {
    if (activeTag !== 'all' && (s.tags || []).indexOf(activeTag) === -1) return false;
    if (searchQuery && (s.title || '').toLowerCase().indexOf(searchQuery) === -1) return false;
    return true;
  }

  function findPinnedStory() {
    for (var i = 0; i < flatStories.length; i++) {
      if (flatStories[i].pinned) return flatStories[i];
    }
    return null;
  }

  function headlineButtonHTML(s) {
    var cls = 'headline-item' + (s.id === activeId ? ' active' : '') + (s.pinned ? ' pinned' : '');
    var prefix = (s.pinned ? '<span class="headline-pin-icon">' + themeIconSVG(PIN_ICON_PATH) + '</span>' : '') +
      '<span class="headline-date-prefix">' + escapeHTML(fmtDatePrefix(s.date)) + ':</span> ';
    return '<button type="button" class="' + cls + '" data-id="' + escapeHTML(s.id) + '"' +
      (s.id === activeId ? ' aria-current="true"' : '') + '>' + prefix + escapeHTML(s.title || '') + '</button>';
  }

  function renderHeadlines() {
    var visibleIds = [];

    if (searchQuery) {
      var matches = flatStories.filter(storyMatchesFilter);
      visibleIds = matches.map(function (s) { return s.id; });
      headlinePanel.innerHTML = matches.length
        ? matches.map(headlineButtonHTML).join('')
        : '<p class="empty-state">No headlines match "' + escapeHTML(headlineSearchInput.value.trim()) + '".</p>';
      return visibleIds;
    }

    var html = '';

    var pinned = findPinnedStory();
    var pinnedVisible = pinned && storyMatchesFilter(pinned);

    if (pinnedVisible) {
      visibleIds.push(pinned.id);
      html += headlineButtonHTML(pinned);
    }

    var bucketOrder = ['Today', 'Yesterday', 'This Week', 'Older'];
    var bucketHTML = { Today: '', Yesterday: '', 'This Week': '', Older: '' };
    var bucketIds = { Today: [], Yesterday: [], 'This Week': [], Older: [] };

    digests.forEach(function (group) {
      var stories = flatStories.filter(function (s) {
        return s.date === group.date && storyMatchesFilter(s) && (!pinned || s.id !== pinned.id);
      });
      if (!stories.length) return;

      var groupHTML = '';
      stories.forEach(function (s) {
        groupHTML += headlineButtonHTML(s);
      });

      var key = bucketKey(daysAgo(group.date));
      bucketHTML[key] += groupHTML;
      stories.forEach(function (s) { bucketIds[key].push(s.id); });
    });

    var restHTML = '';
    bucketOrder.forEach(function (key) {
      var ids = bucketIds[key];
      if (!ids.length) return;
      visibleIds = visibleIds.concat(ids);

      if (key === 'Today') {
        restHTML += '<div class="headline-group-header">Today</div>' + bucketHTML[key];
        return;
      }

      if (ids.indexOf(activeId) !== -1) {
        expandedGroups[key] = true;
      }
      var expanded = !!expandedGroups[key];
      var label = key === 'Older' ? 'Older stories' : key;
      restHTML += '<div class="headline-archive' + (expanded ? ' expanded' : '') + '">' +
        '<button type="button" class="headline-archive-toggle" data-group-toggle="' + key + '" aria-expanded="' + (expanded ? 'true' : 'false') + '">' +
        escapeHTML(label) + ' (' + ids.length + ')' + themeIconSVG(ARCHIVE_CHEVRON_ICON_PATH) + '</button>' +
        '<div class="headline-archive-body">' + bucketHTML[key] + '</div>' +
        '</div>';
    });

    if (pinnedVisible && restHTML) {
      html += '<div class="headline-divider"></div>';
    }
    html += restHTML;

    headlinePanel.innerHTML = html || '<p class="empty-state">No stories match this filter yet.</p>';
    return visibleIds;
  }

  function getNavigableIds() {
    if (searchQuery) {
      return flatStories.filter(storyMatchesFilter).map(function (s) { return s.id; });
    }

    var ids = [];
    var pinned = findPinnedStory();
    if (pinned && storyMatchesFilter(pinned)) ids.push(pinned.id);

    digests.forEach(function (group) {
      flatStories.filter(function (s) {
        return s.date === group.date && storyMatchesFilter(s) && (!pinned || s.id !== pinned.id);
      }).forEach(function (s) { ids.push(s.id); });
    });

    return ids;
  }

  function renderStory(story) {
    if (!story) {
      storyPanel.innerHTML = '<p class="empty-state">No stories match this filter yet.</p>';
      return;
    }
    var primaryTag = (story.tags || [])[0];
    var accentColor = (THEME_COLORS[primaryTag] || {}).text;
    var accentStyle = accentColor ? ' style="--story-accent:' + accentColor + '"' : '';

    var navIds = getNavigableIds();
    var navIndex = navIds.indexOf(story.id);
    var prevId = navIndex > 0 ? navIds[navIndex - 1] : null;
    var nextId = navIndex !== -1 && navIndex < navIds.length - 1 ? navIds[navIndex + 1] : null;

    var html = '';
    html += '<button type="button" class="story-back" id="story-back">‹ All headlines</button>';
    html += '<div class="story-toprow">';
    html += '<div class="story-meta">';
    html += '<div class="story-source">' + escapeHTML(fmtDateLong(story.date)) + '</div>';
    if (story.pinned) {
      html += '<div class="story-pinned-badge">' + themeIconSVG(PIN_ICON_PATH) + 'Pinned story</div>';
    }
    html += '</div>';
    html += '<div class="story-nav">';
    html += '<button type="button" class="story-nav-btn" id="story-prev"' + (prevId ? ' data-id="' + escapeHTML(prevId) + '"' : ' disabled') + '>‹ Previous</button>';
    html += '<button type="button" class="story-nav-btn" id="story-next"' + (nextId ? ' data-id="' + escapeHTML(nextId) + '"' : ' disabled') + '>Next ›</button>';
    html += '</div>';
    html += '</div>';
    html += '<h2 class="story-title">' + escapeHTML(story.title || '') + '</h2>';
    html += '<p class="story-summary">' + escapeHTML(story.summary || '') + '</p>';
    if (story.implications) {
      html += '<div class="story-implications"><span class="story-implications-label">Why it matters</span><p>' + escapeHTML(story.implications) + '</p></div>';
    }
    if (story.url) {
      html += '<a class="story-source-link" href="' + escapeHTML(story.url) + '" target="_blank" rel="noopener noreferrer"' + accentStyle + '>Read at ' + escapeHTML(story.source || 'source') + ' <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></a>';
    }
    html += '<div class="story-tags">';
    (story.tags || []).forEach(function (t) {
      var c = THEME_COLORS[t] || { bg: '#D8E4DD', text: '#1F4D4A' };
      html += '<span class="story-tag" style="background:' + c.bg + ';color:' + c.text + '">' + escapeHTML(THEME_LABELS[t] || titleCase(t)) + '</span>';
    });
    html += '</div>';

    /* -- share bar temporarily disabled --
    var shareUrl = window.location.origin + '/news.html?story=' + encodeURIComponent(story.id);
    html += '<div class="story-share" aria-label="Share this story">' +
      '<span class="share-label">Share</span>' +
      '<a class="share-btn share-linkedin" target="_blank" rel="noopener noreferrer" href="https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(shareUrl) + '">LinkedIn</a>' +
      '<a class="share-btn share-x" target="_blank" rel="noopener noreferrer" href="https://twitter.com/intent/tweet?text=' + encodeURIComponent(story.title || '') + '&url=' + encodeURIComponent(shareUrl) + '">X</a>' +
      '<button type="button" class="share-btn share-copy" data-share-url="' + escapeHTML(shareUrl) + '">Copy link</button>' +
      '</div>';
    -- */

    storyPanel.innerHTML = html;

    var backBtn = document.getElementById('story-back');
    if (backBtn) backBtn.addEventListener('click', function () {
      layoutEl.classList.remove('show-detail');
      headlinePanel.focus();
    });

    var prevBtn = document.getElementById('story-prev');
    if (prevBtn) prevBtn.addEventListener('click', function () {
      var id = prevBtn.getAttribute('data-id');
      if (id) selectStory(id, { scrollIntoHeadline: true });
    });
    var nextBtn = document.getElementById('story-next');
    if (nextBtn) nextBtn.addEventListener('click', function () {
      var id = nextBtn.getAttribute('data-id');
      if (id) selectStory(id, { scrollIntoHeadline: true });
    });

    /* -- share bar temporarily disabled --
    var copyBtn = storyPanel.querySelector('.share-copy');
    if (copyBtn) copyBtn.addEventListener('click', function () {
      navigator.clipboard.writeText(copyBtn.getAttribute('data-share-url')).then(function () {
        copyBtn.textContent = 'Copied!';
        setTimeout(function () { copyBtn.textContent = 'Copy link'; }, 1800);
      });
    });
    -- */
  }

  function selectStory(id, opts) {
    opts = opts || {};
    var story = flatStories.filter(function (s) { return s.id === id; })[0];
    if (!story) return;
    activeId = id;

    var url = new URL(window.location.href);
    url.searchParams.set('story', id);
    if (opts.replace) {
      window.history.replaceState({}, '', url);
    } else {
      window.history.pushState({}, '', url);
    }

    var hadFocusInPanel = headlinePanel.contains(document.activeElement);

    renderHeadlines();
    renderStory(story);
    layoutEl.classList.add('show-detail');

    if (opts.scrollIntoHeadline) {
      var activeEl = headlinePanel.querySelector('.headline-item.active');
      if (activeEl) {
        activeEl.scrollIntoView({ block: 'nearest' });
        // Re-rendering replaces the button the browser just focused, silently
        // dropping focus to <body> — restore it so arrow keys keep navigating
        // the list instead of falling through to native page scroll.
        if (hadFocusInPanel) activeEl.focus();
      }
    }
  }

  function pickDefaultStory() {
    var pinned = findPinnedStory();
    if (pinned && storyMatchesFilter(pinned)) return pinned.id;
    var visible = flatStories.filter(storyMatchesFilter);
    return visible[0] ? visible[0].id : (flatStories[0] ? flatStories[0].id : null);
  }

  function buildFilterBar(resetScroll) {
    var tagsInUse = {};
    flatStories.forEach(function (s) {
      (s.tags || []).forEach(function (t) { tagsInUse[t] = true; });
    });
    var tags = THEME_ORDER.filter(function (t) { return tagsInUse[t]; });

    var chips = [{ key: 'all', label: 'All stories', icon: ALL_ICON_PATH }].concat(
      tags.map(function (t) { return { key: t, label: THEME_LABELS[t] || titleCase(t), icon: THEME_ICON_PATHS[t] }; })
    );

    filterBar.innerHTML = chips.map(function (c) {
      var cls = 'filter-chip' + (c.key === activeTag ? ' active' : '');
      var colors = THEME_COLORS[c.key];
      var style = colors ? ' style="background:' + colors.bg + ';color:' + colors.text + '"' : '';
      return '<button type="button" class="' + cls + '" data-tag="' + escapeHTML(c.key) + '"' + style + '>' +
        themeIconSVG(c.icon) + escapeHTML(c.label) + '</button>';
    }).join('');

    if (resetScroll) filterBar.scrollLeft = 0;
    updateScrollArrows();
  }

  function updateScrollArrows() {
    if (!filterScrollPrev || !filterScrollNext) return;
    var maxScroll = filterBar.scrollWidth - filterBar.clientWidth;
    filterScrollPrev.hidden = filterBar.scrollLeft <= 4;
    filterScrollNext.hidden = maxScroll <= 4 || filterBar.scrollLeft >= maxScroll - 4;
  }

  filterBar.addEventListener('scroll', updateScrollArrows);
  window.addEventListener('resize', updateScrollArrows);

  if (filterScrollPrev) filterScrollPrev.addEventListener('click', function () {
    filterBar.scrollBy({ left: -filterBar.clientWidth * 0.7, behavior: 'smooth' });
  });
  if (filterScrollNext) filterScrollNext.addEventListener('click', function () {
    filterBar.scrollBy({ left: filterBar.clientWidth * 0.7, behavior: 'smooth' });
  });

  filterBar.addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-chip');
    if (!btn) return;
    activeTag = btn.getAttribute('data-tag');
    buildFilterBar();

    var visibleIds = renderHeadlines();
    if (visibleIds.indexOf(activeId) === -1) {
      var fallback = pickDefaultStory();
      if (fallback) selectStory(fallback, { replace: true });
    }
  });

  headlinePanel.addEventListener('click', function (e) {
    var toggle = e.target.closest('.headline-archive-toggle');
    if (toggle) {
      var key = toggle.getAttribute('data-group-toggle');
      expandedGroups[key] = !expandedGroups[key];
      renderHeadlines();
      return;
    }
    var btn = e.target.closest('.headline-item');
    if (!btn) return;
    selectStory(btn.getAttribute('data-id'), { scrollIntoHeadline: true });
  });

  function getFocusStops() {
    return Array.prototype.filter.call(headlinePanel.querySelectorAll('.headline-item, .headline-archive-toggle'), function (el) {
      return el.offsetParent !== null;
    });
  }

  headlinePanel.addEventListener('keydown', function (e) {
    var target = e.target;
    if (!target.classList) return;
    var isItem = target.classList.contains('headline-item');
    var isToggle = target.classList.contains('headline-archive-toggle');
    if (!isItem && !isToggle) return;

    var stops = getFocusStops();
    var idx = stops.indexOf(target);
    if (idx === -1) return;

    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      var delta = e.key === 'ArrowDown' ? 1 : -1;
      var next = stops[(idx + delta + stops.length) % stops.length];
      next.focus();
      next.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Home') {
      e.preventDefault();
      stops[0].focus();
      stops[0].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'End') {
      e.preventDefault();
      stops[stops.length - 1].focus();
      stops[stops.length - 1].scrollIntoView({ block: 'nearest' });
    } else if (isItem && /^[a-z0-9]$/i.test(e.key)) {
      var ch = e.key.toLowerCase();
      var items = stops.filter(function (el) { return el.classList.contains('headline-item'); });
      var itemIdx = items.indexOf(target);
      for (var offset = 1; offset <= items.length; offset++) {
        var cand = items[(itemIdx + offset) % items.length];
        var titleText = (cand.textContent || '').replace(/^\d{1,2}\s+\w+:\s*/, '').trim();
        if (titleText.toLowerCase().indexOf(ch) === 0) {
          cand.focus();
          cand.scrollIntoView({ block: 'nearest' });
          break;
        }
      }
    }
  });

  headlineSearchInput.addEventListener('input', function () {
    searchQuery = this.value.trim().toLowerCase();
    var visibleIds = renderHeadlines();
    if (visibleIds.indexOf(activeId) === -1) {
      var fallback = pickDefaultStory();
      if (fallback) selectStory(fallback, { replace: true });
      else renderStory(null);
    }
  });

  headlineSearchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && this.value) {
      this.value = '';
      searchQuery = '';
      var visibleIds = renderHeadlines();
      if (visibleIds.indexOf(activeId) === -1) {
        var fallback = pickDefaultStory();
        if (fallback) selectStory(fallback, { replace: true });
        else renderStory(null);
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      var first = getFocusStops()[0];
      if (first) first.focus();
    }
  });

  window.addEventListener('popstate', function () {
    var params = new URLSearchParams(window.location.search);
    var id = params.get('story');
    if (id && flatStories.some(function (s) { return s.id === id; })) {
      activeId = id;
      renderHeadlines();
      renderStory(flatStories.filter(function (s) { return s.id === id; })[0]);
    }
  });

  fetch('news.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      digests = (data || []).slice().sort(function (a, b) { return a.date < b.date ? 1 : -1; });
      buildFlatStories();
      buildFilterBar(true);

      var params = new URLSearchParams(window.location.search);
      var requestedId = params.get('story');
      var initialId = (requestedId && flatStories.some(function (s) { return s.id === requestedId; }))
        ? requestedId
        : pickDefaultStory();

      if (initialId) {
        selectStory(initialId, { replace: true, scrollIntoHeadline: true });
      } else {
        renderHeadlines();
        renderStory(null);
      }
    })
    .catch(function () {
      headlinePanel.innerHTML = '<p class="empty-state">Couldn\'t load the news feed. Try refreshing.</p>';
    });
})();
</script>
</body>
</html>
